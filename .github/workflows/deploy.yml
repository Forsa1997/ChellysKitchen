name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger backend deploy (Render)
        if: ${{ env.RENDER_BACKEND_DEPLOY_HOOK_URL != '' }}
        run: |
          curl --fail --show-error --silent \
            --request POST \
            "$RENDER_BACKEND_DEPLOY_HOOK_URL"

  deploy-frontend:
    runs-on: ubuntu-latest
    env:
      RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger frontend deploy (Render)
        if: ${{ env.RENDER_FRONTEND_DEPLOY_HOOK_URL != '' }}
        run: |
          curl --fail --show-error --silent \
            --request POST \
            "$RENDER_FRONTEND_DEPLOY_HOOK_URL"

  summary:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "Deploy workflow finished."
          echo "If a deploy was skipped, set:"
          echo "- RENDER_BACKEND_DEPLOY_HOOK_URL"
          echo "- RENDER_FRONTEND_DEPLOY_HOOK_URL"
