name: Deploy to Render

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deploy (Render)
        if: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL != '' }}
        run: |
          curl --fail --show-error --silent \
            --request POST \
            "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"

      - name: Trigger frontend deploy (Render)
        if: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL != '' }}
        run: |
          curl --fail --show-error --silent \
            --request POST \
            "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}"

      - name: Summary
        run: |
          echo "Workflow finished."
          echo "If a deploy was skipped, set the corresponding GitHub secret:"
          echo "- RENDER_BACKEND_DEPLOY_HOOK_URL"
          echo "- RENDER_FRONTEND_DEPLOY_HOOK_URL"
