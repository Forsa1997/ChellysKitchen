<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Chellys Kitchen Logo: Kochtopf mit Herz-Dampf">
  <defs>
    <linearGradient id="ckBadge" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="hsl(342, 68%, 56%)"/>
      <stop offset="1" stop-color="hsl(342, 74%, 36%)"/>
    </linearGradient>
    <linearGradient id="ckShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <circle cx="32" cy="32" r="30" fill="url(#ckBadge)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
  <ellipse cx="26" cy="16" rx="18" ry="10" fill="url(#ckShine)"/>

  <!-- heart-shaped steam -->
  <path
    d="M32 27.5
       c -1.2 -3 -4.6 -4.6 -7 -3.2
       c -2.6 1.5 -3.2 5 -1.2 7.4
       c 1.8 2.2 5.4 4.6 8.2 6
       c 2.8 -1.4 6.4 -3.8 8.2 -6
       c 2 -2.4 1.4 -5.9 -1.2 -7.4
       c -2.4 -1.4 -5.8 0.2 -7 3.2 z"
    fill="#ffffff"/>
  <path d="M22.5 20.5 q -1.6 -2.4 0 -4.6 q 1.4 -1.8 0.2 -3.9" fill="none" stroke="#ffffff" stroke-opacity="0.65" stroke-width="2" stroke-linecap="round"/>
  <path d="M41.5 20.5 q 1.6 -2.4 0 -4.6 q -1.4 -1.8 -0.2 -3.9" fill="none" stroke="#ffffff" stroke-opacity="0.65" stroke-width="2" stroke-linecap="round"/>

  <!-- pot -->
  <path d="M19 41 h26 a1.6 1.6 0 0 1 1.6 1.8 c -0.5 5.4 -3 9.2 -6.1 10.2 a32 32 0 0 1 -17 0 c -3.1 -1 -5.6 -4.8 -6.1 -10.2 a1.6 1.6 0 0 1 1.6 -1.8 z" fill="#ffffff"/>
  <rect x="12.5" y="42.6" width="5.5" height="2.6" rx="1.3" fill="#ffffff"/>
  <rect x="46" y="42.6" width="5.5" height="2.6" rx="1.3" fill="#ffffff"/>
  <line x1="21" y1="45.4" x2="43" y2="45.4" stroke="hsl(342, 74%, 40%)" stroke-width="1.6" stroke-linecap="round"/>
</svg>
