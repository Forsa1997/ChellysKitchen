<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Linsen-Kokos-Suppe">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1ece3"/>
      <stop offset="1" stop-color="#d9ccb6"/>
    </linearGradient>
    <radialGradient id="soup" cx="0.42" cy="0.38" r="0.7">
      <stop offset="0" stop-color="#f4a24a"/>
      <stop offset="1" stop-color="#e07f26"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg5)"/>
  <ellipse cx="400" cy="300" rx="290" ry="150" fill="#000" opacity="0.08"/>
  <!-- bowl -->
  <ellipse cx="400" cy="270" rx="230" ry="150" fill="#ffffff"/>
  <ellipse cx="400" cy="270" rx="230" ry="150" fill="none" stroke="#e4ddd0" stroke-width="4"/>
  <ellipse cx="400" cy="262" rx="190" ry="120" fill="url(#soup)"/>
  <ellipse cx="400" cy="262" rx="190" ry="120" fill="none" stroke="#c96f1f" stroke-width="3" opacity="0.4"/>
  <!-- coconut swirl -->
  <g fill="none" stroke="#fdf3e2" stroke-width="9" stroke-linecap="round" opacity="0.92">
    <path d="M300 250 q40 -40 100 -20 q60 20 90 -10"/>
    <path d="M320 300 q60 30 130 8"/>
  </g>
  <!-- red lentils dots -->
  <g fill="#d86a20">
    <circle cx="340" cy="230" r="5"/><circle cx="420" cy="290" r="5"/>
    <circle cx="470" cy="250" r="5"/><circle cx="360" cy="300" r="5"/>
    <circle cx="400" cy="215" r="5"/><circle cx="450" cy="300" r="5"/>
  </g>
  <!-- lime wedge -->
  <g transform="translate(470 210)">
    <path d="M0 0 a34 34 0 0 1 30 18 L2 34 Z" fill="#8fbf3d"/>
    <path d="M4 6 a24 24 0 0 1 20 12 L6 30 Z" fill="#c6e08a"/>
    <g stroke="#a6cf5a" stroke-width="2"><path d="M6 10 l14 8 M8 18 l12 4"/></g>
  </g>
  <!-- cilantro leaves -->
  <g fill="#3f8b3a">
    <path d="M340 250 q12 -14 26 -4 q-8 16 -26 4z"/>
    <path d="M410 268 q12 -12 24 -2 q-8 14 -24 2z"/>
    <path d="M370 288 q11 -12 22 -2 q-7 14 -22 2z"/>
  </g>
  <!-- ginger fleck + steam -->
  <g stroke="#efe7d8" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M360 150 q-14 -20 0 -40 q14 -20 0 -40"/>
    <path d="M440 150 q14 -20 0 -40 q-14 -20 0 -40"/>
  </g>
</svg>
