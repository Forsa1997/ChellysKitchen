  <g stroke="#3f7a34" stroke-width="4" fill="none" stroke-linecap="round">
    <g transform="translate(240 300) rotate(-25)">
      <path d="M0 0 l70 -8"/>
      <path d="M14 -1 l-4 -8 M14 -1 l6 -6 M32 -3 l-4 -8 M32 -3 l6 -6 M50 -6 l-4 -8 M50 -6 l6 -6"/>
    </g>
    <g transform="translate(430 350) rotate(10)">
      <path d="M0 0 l60 -6"/>
      <path d="M14 -1 l-4 -8 M14 -1 l6 -6 M32 -3 l-4 -8 M32 -3 l6 -6 M48 -5 l-4 -8 M48 -5 l6 -6"/>
    </g>
  </g>
</svg>
