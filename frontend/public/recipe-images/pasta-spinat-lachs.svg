<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Cremige Pasta mit Spinat und Lachs">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3ede2"/>
      <stop offset="0.55" stop-color="#e9dcc7"/>
      <stop offset="1" stop-color="#d8c4a3"/>
    </linearGradient>
    <radialGradient id="plate" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.82" stop-color="#f4f4f2"/>
      <stop offset="1" stop-color="#dcdad4"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="280" rx="300" ry="150" fill="#000" opacity="0.08"/>
  <ellipse cx="400" cy="262" rx="285" ry="150" fill="url(#plate)"/>
  <ellipse cx="400" cy="262" rx="215" ry="112" fill="#fbf7f0"/>
  <ellipse cx="400" cy="262" rx="215" ry="112" fill="none" stroke="#e7e1d6" stroke-width="3"/>
  <!-- cream sauce base -->
  <ellipse cx="400" cy="266" rx="180" ry="92" fill="#f6ead2"/>
  <!-- tagliatelle ribbons -->
  <g fill="none" stroke="#e9c986" stroke-width="10" stroke-linecap="round" opacity="0.95">
    <path d="M270 250 q60 -46 130 -20 q70 26 130 -14"/>
    <path d="M262 278 q70 40 150 20 q80 -22 132 12"/>
    <path d="M300 300 q60 24 120 6 q70 -20 118 8"/>
    <path d="M290 232 q70 -30 140 -8 q60 20 108 -2"/>
  </g>
  <g fill="none" stroke="#f2dcaa" stroke-width="5" stroke-linecap="round">
    <path d="M272 252 q60 -44 130 -18 q70 26 128 -12"/>
    <path d="M264 280 q70 38 150 18 q80 -22 130 10"/>
  </g>
  <!-- salmon cubes -->
  <g>
    <rect x="330" y="238" width="34" height="26" rx="6" fill="#f08b6a"/>
    <rect x="336" y="244" width="34" height="10" rx="4" fill="#f7a98d"/>
    <rect x="420" y="270" width="34" height="26" rx="6" fill="#ee825f"/>
    <rect x="426" y="276" width="34" height="10" rx="4" fill="#f7a98d"/>
    <rect x="370" y="290" width="30" height="24" rx="6" fill="#f19277"/>
    <rect x="375" y="295" width="30" height="9" rx="4" fill="#f8b096"/>
  </g>
  <!-- spinach leaves -->
  <g fill="#4c8b3f">
    <path d="M300 258 q16 -18 34 -6 q-8 20 -34 6z"/>
    <path d="M456 250 q18 -14 34 0 q-12 18 -34 0z"/>
    <path d="M340 300 q16 -16 32 -4 q-8 18 -32 4z"/>
    <path d="M410 244 q14 -16 30 -6 q-8 18 -30 6z"/>
    <path d="M448 296 q16 -14 32 -2 q-10 18 -32 2z"/>
  </g>
  <g fill="#6aa85a">
    <path d="M304 260 q12 -12 24 -4 q-6 14 -24 4z"/>
    <path d="M344 302 q12 -12 24 -4 q-6 14 -24 4z"/>
  </g>
  <!-- dill sprigs -->
  <g stroke="#5f9b4f" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M380 232 l0 -14 M380 226 l-6 -6 M380 226 l6 -6 M380 220 l-5 -5 M380 220 l5 -5"/>
  </g>
