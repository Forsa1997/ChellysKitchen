<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Apfel-Zimt-Porridge">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4efe6"/>
      <stop offset="1" stop-color="#ddceb6"/>
    </linearGradient>
    <radialGradient id="oats" cx="0.5" cy="0.4" r="0.65">
      <stop offset="0" stop-color="#f0e3c7"/>
      <stop offset="1" stop-color="#dcc79c"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg10)"/>
  <ellipse cx="400" cy="300" rx="285" ry="150" fill="#000" opacity="0.08"/>
  <ellipse cx="400" cy="272" rx="228" ry="150" fill="#ffffff"/>
  <ellipse cx="400" cy="272" rx="228" ry="150" fill="none" stroke="#e2dacb" stroke-width="4"/>
  <ellipse cx="400" cy="264" rx="190" ry="120" fill="url(#oats)"/>
  <!-- oat texture -->
  <g fill="#cbb586" opacity="0.7">
    <ellipse cx="330" cy="240" rx="8" ry="4"/><ellipse cx="380" cy="270" rx="8" ry="4"/>
    <ellipse cx="440" cy="250" rx="8" ry="4"/><ellipse cx="350" cy="290" rx="8" ry="4"/>
    <ellipse cx="470" cy="280" rx="8" ry="4"/><ellipse cx="410" cy="300" rx="8" ry="4"/>
    <ellipse cx="300" cy="270" rx="8" ry="4"/>
  </g>
  <!-- apple slices fanned -->
  <g>
    <g transform="translate(360 236) rotate(-20)"><path d="M0 0 q40 -14 70 0 q-6 16 -35 16 q-29 0 -35 -16z" fill="#f2e7c0"/><path d="M0 0 q40 -14 70 0" fill="none" stroke="#e0b23a" stroke-width="4"/></g>
    <g transform="translate(392 250) rotate(-6)"><path d="M0 0 q40 -14 70 0 q-6 16 -35 16 q-29 0 -35 -16z" fill="#f6ecca"/><path d="M0 0 q40 -14 70 0" fill="none" stroke="#e0b23a" stroke-width="4"/></g>
    <g transform="translate(384 274) rotate(8)"><path d="M0 0 q40 -14 70 0 q-6 16 -35 16 q-29 0 -35 -16z" fill="#f2e7c0"/><path d="M0 0 q40 -14 70 0" fill="none" stroke="#e0b23a" stroke-width="4"/></g>
  </g>
  <!-- cinnamon stick -->
  <g transform="translate(300 300) rotate(24)">
    <rect x="0" y="0" width="80" height="18" rx="9" fill="#a5622c"/>
    <rect x="0" y="0" width="80" height="7" rx="3" fill="#bd7a3f"/>
  </g>
  <!-- cinnamon dusting -->
  <g fill="#9c5a2a" opacity="0.55">
    <circle cx="420" cy="230" r="2"/><circle cx="440" cy="238" r="2"/><circle cx="460" cy="246" r="2"/>
    <circle cx="430" cy="252" r="2"/><circle cx="452" cy="262" r="2"/>
  </g>
  <!-- walnut halves -->
  <g fill="#c69a5c">
    <path d="M300 240 q18 -12 34 0 q-2 20 -17 22 q-15 -2 -17 -22z"/>
    <path d="M470 230 q18 -12 34 0 q-2 20 -17 22 q-15 -2 -17 -22z"/>
  </g>
  <g stroke="#a3743a" stroke-width="2" fill="none">
    <path d="M317 238 v22 M310 246 q7 -4 14 0 M310 254 q7 -4 14 0"/>
    <path d="M487 228 v22 M480 236 q7 -4 14 0 M480 244 q7 -4 14 0"/>
  </g>
  <!-- honey drizzle -->
  <path d="M360 224 q30 -10 60 6 q30 16 60 6" fill="none" stroke="#f0b93f" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
</svg>
