<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Asia-Nudelpfanne mit Erdnusssauce">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0ece4"/>
      <stop offset="1" stop-color="#d4c9b4"/>
    </linearGradient>
    <radialGradient id="wok" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#3a3d42"/>
      <stop offset="1" stop-color="#222427"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg9)"/>
  <ellipse cx="400" cy="300" rx="290" ry="150" fill="#000" opacity="0.08"/>
  <!-- chopsticks behind bowl -->
  <g stroke="#b9863f" stroke-width="8" stroke-linecap="round" transform="rotate(-14 400 200)">
    <path d="M470 120 l150 -46"/>
    <path d="M478 138 l150 -46"/>
  </g>
  <!-- wok / bowl -->
  <ellipse cx="400" cy="272" rx="232" ry="152" fill="url(#wok)"/>
  <ellipse cx="400" cy="264" rx="196" ry="124" fill="#2b2d31"/>
  <!-- noodles -->
  <g fill="none" stroke="#e9c65a" stroke-width="11" stroke-linecap="round">
    <path d="M280 250 q60 -46 130 -22 q70 24 132 -12"/>
    <path d="M270 288 q70 40 150 22 q78 -18 130 8"/>
    <path d="M300 312 q60 22 122 6 q66 -18 116 4"/>
    <path d="M296 224 q70 -30 140 -8 q56 18 104 0"/>
  </g>
  <g fill="none" stroke="#f4dc93" stroke-width="5" stroke-linecap="round">
    <path d="M282 252 q60 -44 130 -20 q70 24 130 -10"/>
    <path d="M272 290 q70 38 150 20 q78 -18 128 6"/>
  </g>
  <!-- peanut sauce drizzle -->
  <g fill="none" stroke="#c98a3f" stroke-width="7" stroke-linecap="round" opacity="0.85">
    <path d="M330 240 q50 30 120 14 q40 -8 70 6"/>
  </g>
  <!-- broccoli -->
  <g>
    <g transform="translate(340 232)"><circle cx="0" cy="-2" r="9" fill="#3f8b3a"/><circle cx="10" cy="0" r="9" fill="#4f9d47"/><circle cx="-8" cy="2" r="8" fill="#4f9d47"/><rect x="-3" y="4" width="8" height="10" rx="3" fill="#8cbf6a"/></g>
    <g transform="translate(452 290)"><circle cx="0" cy="-2" r="9" fill="#3f8b3a"/><circle cx="10" cy="0" r="9" fill="#4f9d47"/><circle cx="-8" cy="2" r="8" fill="#4f9d47"/><rect x="-3" y="4" width="8" height="10" rx="3" fill="#8cbf6a"/></g>
    <g transform="translate(408 250)"><circle cx="0" cy="-2" r="8" fill="#3f8b3a"/><circle cx="9" cy="0" r="8" fill="#4f9d47"/><circle cx="-7" cy="2" r="7" fill="#4f9d47"/></g>
  </g>
  <!-- carrot strips -->
  <g fill="#e8862f">
    <rect x="360" y="286" width="46" height="9" rx="4" transform="rotate(18 383 290)"/>
    <rect x="420" y="236" width="46" height="9" rx="4" transform="rotate(-12 443 240)"/>
    <rect x="470" y="270" width="40" height="9" rx="4" transform="rotate(24 490 274)"/>
  </g>
  <!-- crushed peanuts + sesame -->
  <g fill="#e6cf87">
    <circle cx="360" cy="300" r="4"/><circle cx="430" cy="220" r="4"/><circle cx="400" cy="300" r="4"/>
    <circle cx="470" cy="240" r="4"/><circle cx="340" cy="270" r="4"/>
  </g>
</svg>
