<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="BBQ Rippchen mit Honig-Glasur">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe6d8"/>
      <stop offset="0.5" stop-color="#e0d0b6"/>
      <stop offset="1" stop-color="#c9b291"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a5a34"/>
      <stop offset="1" stop-color="#6e4526"/>
    </linearGradient>
    <linearGradient id="glaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5391f"/>
      <stop offset="1" stop-color="#6e2011"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>
  <ellipse cx="400" cy="300" rx="300" ry="150" fill="#000" opacity="0.08"/>
  <!-- wooden board -->
  <rect x="150" y="150" width="500" height="260" rx="26" fill="url(#board)"/>
  <g stroke="#5e3a1f" stroke-width="2" opacity="0.4">
    <path d="M180 190 h440 M180 240 h440 M180 300 h440 M180 360 h440"/>
  </g>
  <!-- rack of ribs -->
  <g>
    <path d="M230 200 q200 -30 340 0 l0 190 q-170 26 -340 0 z" fill="url(#glaze)"/>
    <!-- rib bone separations -->
    <g stroke="#3f120a" stroke-width="8" opacity="0.55" stroke-linecap="round">
      <path d="M280 205 q6 90 0 182"/>
      <path d="M330 200 q6 96 0 190"/>
      <path d="M382 198 q4 98 0 194"/>
      <path d="M434 200 q4 96 0 190"/>
      <path d="M486 205 q6 90 0 182"/>
    </g>
    <!-- bone tips -->
    <g fill="#e9d9b8">
      <ellipse cx="238" cy="222" rx="12" ry="9"/>
      <ellipse cx="238" cy="360" rx="12" ry="9"/>
      <ellipse cx="560" cy="222" rx="12" ry="9"/>
      <ellipse cx="560" cy="360" rx="12" ry="9"/>
    </g>
    <!-- glossy glaze highlights -->
    <g fill="#d0562f" opacity="0.7">
      <ellipse cx="300" cy="250" rx="20" ry="10"/>
      <ellipse cx="410" cy="300" rx="26" ry="12"/>
      <ellipse cx="500" cy="255" rx="18" ry="9"/>
      <ellipse cx="360" cy="345" rx="22" ry="10"/>
    </g>
    <g fill="#f0a86b" opacity="0.55">
      <ellipse cx="410" cy="296" rx="12" ry="5"/>
      <ellipse cx="300" cy="246" rx="9" ry="4"/>
    </g>
  </g>
  <!-- sesame / pepper flecks -->
  <g fill="#2a0d06">
    <circle cx="330" cy="270" r="3"/>
    <circle cx="450" cy="330" r="3"/>
    <circle cx="400" cy="230" r="3"/>
    <circle cx="480" cy="300" r="3"/>
  </g>
  <!-- rosemary garnish -->
  <g stroke="#3f7a34" stroke-width="4" fill="none" stroke-linecap="round" transform="translate(560 370) rotate(20)">
    <path d="M0 0 l60 -10"/>
    <path d="M12 -2 l-4 -8 M12 -2 l6 -6 M28 -5 l-4 -8 M28 -5 l6 -6 M44 -8 l-4 -8 M44 -8 l6 -6"/>
  </g>
</svg>
