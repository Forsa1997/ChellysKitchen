<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Schoko-Himbeer-Brownies">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2e9df"/>
      <stop offset="1" stop-color="#dcc7ad"/>
    </linearGradient>
    <linearGradient id="brownie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a3620"/>
      <stop offset="1" stop-color="#3c2114"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg7)"/>
  <ellipse cx="400" cy="380" rx="260" ry="60" fill="#000" opacity="0.08"/>
  <ellipse cx="400" cy="368" rx="250" ry="52" fill="#ffffff"/>
  <ellipse cx="400" cy="368" rx="250" ry="52" fill="none" stroke="#e6ded2" stroke-width="3"/>
  <!-- bottom row of brownies -->
  <g>
    <rect x="300" y="300" width="90" height="72" rx="8" fill="url(#brownie)"/>
    <rect x="300" y="300" width="90" height="14" rx="7" fill="#6e4529"/>
    <rect x="410" y="300" width="90" height="72" rx="8" fill="url(#brownie)"/>
    <rect x="410" y="300" width="90" height="14" rx="7" fill="#6e4529"/>
  </g>
  <!-- stacked brownie on top -->
  <g>
    <rect x="352" y="222" width="96" height="78" rx="8" fill="url(#brownie)"/>
    <rect x="352" y="222" width="96" height="16" rx="8" fill="#744a2b"/>
    <!-- glossy crackle top -->
    <g stroke="#8a5c39" stroke-width="2" opacity="0.6" fill="none">
      <path d="M366 232 q16 -6 30 2 q18 8 34 -2"/>
    </g>
    <!-- melty chocolate chunks -->
    <g fill="#28150c">
      <rect x="368" y="250" width="14" height="12" rx="3"/>
      <rect x="404" y="268" width="14" height="12" rx="3"/>
      <rect x="420" y="244" width="12" height="10" rx="3"/>
    </g>
  </g>
  <!-- raspberries -->
  <g>
    <g transform="translate(400 208)">
      <g fill="#d21f52"><circle cx="0" cy="0" r="8"/><circle cx="12" cy="2" r="8"/><circle cx="6" cy="-10" r="8"/><circle cx="18" cy="-8" r="8"/><circle cx="10" cy="10" r="8"/></g>
      <g fill="#e85d84"><circle cx="4" cy="-4" r="3"/><circle cx="14" cy="-2" r="3"/><circle cx="10" cy="4" r="3"/></g>
    </g>
    <g transform="translate(320 292) scale(0.85)">
      <g fill="#d21f52"><circle cx="0" cy="0" r="8"/><circle cx="12" cy="2" r="8"/><circle cx="6" cy="-10" r="8"/><circle cx="18" cy="-8" r="8"/><circle cx="10" cy="10" r="8"/></g>
      <g fill="#e85d84"><circle cx="4" cy="-4" r="3"/><circle cx="14" cy="-2" r="3"/></g>
    </g>
    <g transform="translate(468 292) scale(0.85)">
      <g fill="#d21f52"><circle cx="0" cy="0" r="8"/><circle cx="12" cy="2" r="8"/><circle cx="6" cy="-10" r="8"/><circle cx="18" cy="-8" r="8"/><circle cx="10" cy="10" r="8"/></g>
      <g fill="#e85d84"><circle cx="4" cy="-4" r="3"/><circle cx="14" cy="-2" r="3"/></g>
    </g>
  </g>
  <!-- mint -->
  <g fill="#3f9a4a">
    <path d="M430 196 q14 -16 28 -2 q-9 18 -28 2z"/>
  </g>
  <!-- dusting of powdered sugar -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="360" cy="240" r="2"/><circle cx="440" cy="236" r="2"/><circle cx="400" cy="228" r="2"/>
    <circle cx="330" cy="316" r="2"/><circle cx="470" cy="320" r="2"/>
  </g>
</svg>
