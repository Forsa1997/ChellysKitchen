services:
  - type: web
    name: chellys-kitchen-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run start:render
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: HOST
        value: 0.0.0.0
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      # Initial admin account (needed to reach the admin dashboard).
      # Required in production: without these no admin account is created.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Optional additional accounts (there is no public registration):
      # a JSON array of { name, email, password, role? } objects.
      - key: SEED_USERS
        sync: false
      # Directory for the JSON data store and uploaded images.
      # On Render's free tier the filesystem is ephemeral: data survives
      # restarts but NOT redeploys. To persist across redeploys, attach a
      # persistent disk (paid plan) and point DATA_DIR at its mount path,
      # e.g. set DATA_DIR=/var/data and uncomment the `disk` block below.
      - key: DATA_DIR
        value: ./.data
    # disk:
    #   name: chellys-kitchen-data
    #   mountPath: /var/data
    #   sizeGB: 1

  - type: web
    name: chellys-kitchen-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
