databases:
  - name: chellys-kitchen-db
    plan: free
    databaseName: chellys_kitchen
    user: chellys_kitchen

services:
  - type: web
    name: chellys-kitchen-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: chellys-kitchen-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: chellys-kitchen-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
