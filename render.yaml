databases:
  # Managed Postgres — the durable home of all app data (recipes, users,
  # ratings, favorites, week plan, uploaded images). Cheapest paid plan;
  # data survives every deploy and restart.
  - name: chellys-kitchen-db
    plan: basic-256mb
    region: frankfurt
    postgresMajorVersion: "16"

services:
  - type: web
    name: chellys-kitchen-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    # start:render runs `prisma migrate deploy` before booting the server so
    # the schema is always up to date.
    startCommand: npm run start:render
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: chellys-kitchen-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      # Initial admin account (needed to reach the admin dashboard).
      # Required in production: without these no admin account is created.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Display name of the admin account (defaults to "Admin"); changing it
      # renames the existing account on the next boot.
      - key: ADMIN_NAME
        sync: false
      # Optional additional accounts (there is no public registration):
      # a JSON array of { name, email, password, role? } objects.
      - key: SEED_USERS
        sync: false
      # Local working directory for uploaded images. With DATABASE_URL set
      # this is only a cache — the database holds the durable copies and the
      # server materializes them back to disk on boot.
      - key: DATA_DIR
        value: ./.data

  - type: web
    name: chellys-kitchen-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
