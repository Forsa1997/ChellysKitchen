databases:
  # Managed Postgres — the durable home of all app data (recipes, users,
  # ratings, favorites, week plan, uploaded images). Cheapest paid plan;
  # data survives every deploy and restart.
  - name: chellys-kitchen-db
    plan: basic-256mb
    region: frankfurt
    # 1 GB is the minimum and enough for years of family recipes;
    # together with the plan this pins the price at ~$6.30/month.
    diskSizeGB: 1
    postgresMajorVersion: "18"

services:
  - type: web
    name: chellys-kitchen-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    # start:render runs `prisma migrate deploy` before booting the server so
    # the schema is always up to date.
    startCommand: npm run start:render
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: chellys-kitchen-db
          property: connectionString
      # Allowed browser origins (comma-separated). The custom domain plus
      # the Render fallback URL of the static site.
      - key: CORS_ORIGIN
        value: https://chellys-kitchen.de,https://www.chellys-kitchen.de,https://chellys-kitchen-web.onrender.com
      # Optional: enable the photo recipe import through Google Gemini.
      # Without the key the endpoint answers with a friendly hint.
      - key: GEMINI_API_KEY
        sync: false
      # Initial admin account (needed to reach the admin dashboard). The login
      # identifier is a username. Required in production: without these no admin
      # account is created. ADMIN_EMAIL is still accepted as a legacy alias.
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Display name of the admin account (defaults to "Admin"); changing it
      # renames the existing account on the next boot.
      - key: ADMIN_NAME
        sync: false
      # Optional additional accounts (there is no public registration): a JSON
      # array of { name, username, password, role? } objects (`email` is still
      # accepted as a legacy alias for `username`).
      - key: SEED_USERS
        sync: false
      # Local working directory for uploaded images. With DATABASE_URL set
      # this is only a cache — the database holds the durable copies and the
      # server materializes them back to disk on boot.
      - key: DATA_DIR
        value: ./.data

  - type: web
    name: chellys-kitchen-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Baked into the bundle at build time (Vite). Points the custom-domain
      # site at the API, which keeps its Render URL. A rebuild is required
      # after changing this.
      - key: VITE_API_BASE_URL
        value: https://chellys-kitchen-api.onrender.com
