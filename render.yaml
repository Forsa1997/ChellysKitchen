services:
  - type: pserv
    name: chellys-kitchen-db
    env: postgres
    plan: free
    databaseName: chellys_kitchen
    user: chellys_kitchen

  - type: web
    name: chellys-kitchen-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: chellys-kitchen-db
          property: connectionString

  - type: web
    name: chellys-kitchen-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
